; PlatformIO Project Configuration File
; Target Hardware: ESP32-CAM (AI-Thinker / Aideepen MB)

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; Communication speed for Serial Monitor
monitor_speed = 115200

; CRITICAL: Enable External RAM for Camera FrameBuffer
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Dependencies
lib_deps = 
    espressif/esp32-camera@^2.0.4
    
monitor_rts = 1
monitor_dtr = 1
